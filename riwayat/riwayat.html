<!DOCTYPE html>
<html lang="id"><head>
<meta charset="utf-8"/>
<!-- Prevent caching -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Riwayat Transaksi - MechaMarket</title>
<link rel="stylesheet" href="../home.css"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;500;600;700&display=swap');
  body { font-family: 'Inter', sans-serif; }
  h1, h2, h3, .font-oswald { font-family: 'Oswald', sans-serif; }

  /* ── Tabs ── */
  .rx-tabs { display: flex; gap: 0; border-bottom: 2px solid #f3f4f6; }
  .rx-tab {
    padding: 12px 20px; font-size: 14px; font-weight: 600; color: #6b7280;
    border-bottom: 2px solid transparent; margin-bottom: -2px; cursor: pointer; transition: all 0.15s;
  }
  .rx-tab:hover { color: #d32f2f; }
  .rx-tab.active { color: #d32f2f; border-bottom-color: #d32f2f; }

  /* ── Transaction Card ── */
  .tx-card {
    border: 1px solid #e5e7eb; border-radius: 8px; padding: 20px; margin-bottom: 20px;
    position: relative;
  }
  .tx-card-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
  }
  .tx-card-left { display: flex; align-items: center; gap: 10px; }
  .tx-check {
    width: 24px; height: 24px; border-radius: 50%; background: #dcfce7; color: #16a34a;
    display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0;
  }
  .tx-check.cancelled { background: #fee2e2; color: #dc2626; }
  .tx-inv { font-size: 13px; font-weight: 600; color: #d32f2f; }
  .tx-date { font-size: 12px; color: #9ca3af; margin-left: 12px; }
  .tx-badge {
    font-size: 11px; font-weight: 700; color: #fff; background: #1f2937; padding: 4px 10px;
    border-radius: 4px; letter-spacing: 0.5px;
  }
  .tx-badge.cancelled { background: #dc2626; }

  /* ── Product Row ── */
  .tx-product { display: flex; gap: 16px; align-items: flex-start; }
  .tx-product-img {
    width: 88px; height: 88px; background: #f9fafb; border: 1px solid #e5e7eb;
    border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .tx-product-img img { max-width: 76px; max-height: 76px; object-fit: contain; }
  .tx-product-img i { color: #d1d5db; font-size: 32px; }
  .tx-product-body { flex: 1; }
  .tx-product-grade { font-size: 11px; font-weight: 700; color: #d32f2f; text-transform: uppercase; margin-bottom: 2px; }
  .tx-product-name { font-size: 15px; font-weight: 700; color: #1f2937; margin-bottom: 4px; }

  /* ── Actions ── */
  .tx-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; padding-top: 16px; border-top: 1px solid #f3f4f6; flex-wrap: wrap; }
  .tx-action-btn {
    font-size: 13px; font-weight: 600; padding: 8px 16px; border-radius: 4px; border: 1px solid #d1d5db;
    background: #fff; color: #6b7280; cursor: pointer; transition: all 0.15s;
  }
  .tx-action-btn:hover { border-color: #9ca3af; color: #1f2937; }
  .tx-action-btn.primary { background: #d32f2f; color: #fff; border-color: #d32f2f; }
  .tx-action-btn.primary:hover { background: #b71c1c; }
  .tx-action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── Review Modal ── */
  .review-stars { display: flex; gap: 6px; font-size: 28px; cursor: pointer; user-select: none; }
  .review-stars .star { color: #d1d5db; transition: color 0.15s; }
  .review-stars .star.active, .review-stars .star:hover, .review-stars .star:hover ~ .star { color: #fbbf24; }
  .review-stars .star.active { color: #f59e0b; }
</style>
</head>
<body class="bg-white text-gray-800 antialiased">

<div id="navbar-container"></div>
<script src="../components/navbar.js"></script>



<main class="container mx-auto px-4 py-8">
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

    <!-- Sidebar -->
    <aside class="lg:col-span-1">
      <div class="bg-white border border-gray-200 rounded-lg shadow-sm p-6 text-center">
        <div id="avatar" class="w-24 h-24 rounded-full bg-primary-red text-white text-3xl font-bold flex items-center justify-center mx-auto font-oswald">U</div>
        <h2 id="displayName" class="font-oswald text-2xl font-bold mt-4">User</h2>
        <p id="displayEmail" class="text-sm text-gray-500 mt-1">user@email.com</p>
        <span class="inline-block mt-3 bg-green-100 text-green-700 text-xs font-semibold px-3 py-1 rounded-full">
          <i class="fas fa-check-circle mr-1"></i> Member Aktif
        </span>
      </div>

      <nav class="bg-white border border-gray-200 rounded-lg shadow-sm mt-6 overflow-hidden">
        <a class="flex items-center gap-3 px-5 py-3 font-semibold text-gray-700 hover:bg-gray-50" href="../pesanan/pesanan.html">
          <i class="fas fa-shopping-bag text-primary-red w-5"></i> Pesanan Saya
        </a>
        <a class="flex items-center gap-3 px-5 py-3 font-semibold text-primary-red bg-red-50 border-t border-gray-100" href="riwayat.html">
          <i class="fas fa-history text-primary-red w-5"></i> Riwayat Transaksi
        </a>
        <a class="flex items-center gap-3 px-5 py-3 font-semibold text-gray-700 hover:bg-gray-50 border-t border-gray-100" href="../profile/profile.html">
          <i class="fas fa-user text-primary-red w-5"></i> Profile
        </a>
        <a id="logoutBtn" class="flex items-center gap-3 px-5 py-3 font-semibold text-red-600 hover:bg-red-50 border-t border-gray-100 cursor-pointer" href="#">
          <i class="fas fa-sign-out-alt w-5"></i> Keluar
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <section class="lg:col-span-2">
      <!-- Tabs -->
      <div class="rx-tabs">
        <div class="rx-tab active" data-filter="selesai">Selesai</div>
        <div class="rx-tab" data-filter="batal">Dibatalkan</div>
      </div>

      <div id="historyList" style="margin-top: 24px;"></div>
    </section>

  </div>
</main>

<script>
function getUser() {
  try { var raw = localStorage.getItem('gunpla_user'); if (raw) { var u = JSON.parse(raw); return { name: u.name || u.display_name || 'Guest User', email: u.email || 'guest@email.com' }; } } catch (e) {}
  return { name: 'Guest User', email: 'guest@email.com' };
}

function getOrders() {
  try { var raw = localStorage.getItem('gunpla_orders'); if (raw) return JSON.parse(raw); } catch (e) {}
  return [];
}

function formatRp(n) { return 'Rp ' + (n || 0).toLocaleString('id-ID'); }

function formatDateFull(iso) {
  if (!iso) return '-';
  try {
    var d = new Date(iso);
    var months = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
    return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
  } catch (e) { return iso; }
}

// Use localStorage only — sample orders removed
var allOrders = [];

// Filter only selesai & batal
var currentFilter = 'selesai';

function renderHistory(filter) {
  currentFilter = filter;
  // Always read from localStorage — don't merge with sample
  var stored = getOrders();
  var list = stored.filter(function(o) {
    return o.status === filter;
  });
  list.sort(function(a, b) {
    return new Date(b.date || 0) - new Date(a.date || 0);
  });

  var container = document.getElementById('historyList');

  if (!list.length) {
    container.innerHTML = ''
      + '<div style="text-align:center; padding: 60px 20px; color: #9ca3af;">'
      + '  <i class="fas fa-inbox" style="font-size: 48px; margin-bottom: 12px; display: block;"></i>'
      + '  <p style="font-weight: 600; color: #6b7280;">Belum ada transaksi</p>'
      + '</div>';
    return;
  }

  var html = '';
  list.forEach(function(o) {
    (o.items || []).forEach(function(it) {
      var checkColor = (o.status === 'selesai') ? '#16a34a' : '#dc2626';
      var badgeClass = (o.status === 'batal') ? 'cancelled' : '';
      var imgSrc = it.img || '';
      var imgEl = imgSrc
        ? '<img src="' + imgSrc + '" alt="' + (it.name || '') + '"/>'
        : '<i class="fas fa-box-open"></i>';

      html += ''
        + '<div class="tx-card">'
        + '  <div class="tx-card-header">'
        + '    <div class="tx-card-left">'
        + '      <div class="tx-check" style="color: ' + checkColor + ';">'
        + '        <i class="fas fa-' + (o.status === 'selesai' ? 'check' : 'times') + '"></i>'
        + '      </div>'
        + '      <span class="tx-inv">' + (o.id || '-') + '</span>'
        + '      <span class="tx-date">Selesai pada ' + formatDateFull(o.date) + '</span>'
        + '    </div>'
        + '    <span class="tx-badge ' + badgeClass + '">' + (o.status === 'selesai' ? 'COMPLETE' : 'CANCELLED') + '</span>'
        + '  </div>'
        + '  <div class="tx-product">'
        + '    <div class="tx-product-img">' + imgEl + '</div>'
        + '    <div class="tx-product-body">'
        + '      <div class="tx-product-grade">' + (it.grade || '-') + '</div>'
        + '      <div class="tx-product-name">' + (it.name || '-') + '</div>'
        + '      <div class="tx-product-qty">' + (it.qty || 1) + 'x &middot; ' + formatRp(it.price || o.total || 0) + '</div>'
        + '    </div>'
        + '  </div>'
        + '  <div class="tx-actions">';

      if (o.status === 'selesai') {
        var reviewedKey = 'review_' + o.id;
        var reviewData = JSON.parse(localStorage.getItem(reviewedKey) || 'null');
        var isReviewed = !!reviewData && reviewData.rating > 0;
        html += ''
          + '    <button class="tx-action-btn primary" data-reorder="' + o.id + '"><i class="fas fa-shopping-cart mr-1"></i> Beli Lagi</button>';
        if (isReviewed) {
          html += '    <button class="tx-action-btn primary" style="background:#16a34a;border-color:#16a34a;" data-view-review="' + o.id + '" title="Lihat ulasan Anda"><i class="fas fa-eye mr-1"></i> Lihat Ulasan</button>'
            + '    <button class="tx-action-btn primary" style="background:#6b7280;border-color:#6b7280;" data-edit-review="' + o.id + '" title="Ubah ulasan"><i class="fas fa-edit mr-1"></i> Ubah Ulasan</button>';
        } else {
          html += '    <button class="tx-action-btn primary" data-review="' + o.id + '"><i class="fas fa-star mr-1"></i> Beri Ulasan</button>';
        }
      } else {
        html += ''
          + '    <button class="tx-action-btn primary" disabled style="opacity:0.5;"><i class="fas fa-shopping-cart mr-1"></i> Beli Lagi</button>';
      }

      html += ''
        + '    <button class="tx-action-btn" data-detail="' + o.id + '" style="background:#d32f2f;color:white;border-color:#d32f2f;"><i class="fas fa-eye mr-1"></i> Detail Pesanan</button>'
        + '    <button class="tx-action-btn" data-delete="' + o.id + '" style="background:#dc2626;color:white;border-color:#dc2626;" title="Hapus dari riwayat"><i class="fas fa-trash mr-1"></i> Hapus</button>'
        + '  </div></div>';
    });
  });

  container.innerHTML = html;

  // Bind events
  container.querySelectorAll('[data-reorder]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var id = this.getAttribute('data-reorder');
      var o = allOrders.find(function(x) { return x.id === id; });
      if (o) {
        try { localStorage.setItem('cart', JSON.stringify(o.items || [])); } catch (e) {}
        window.location.href = '../keranjang/keranjang.html';
      }
    });
  });

  container.querySelectorAll('[data-review]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var id = this.getAttribute('data-review');
      openReviewModal(id, false);
    });
  });

  container.querySelectorAll('[data-edit-review]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var id = this.getAttribute('data-edit-review');
      openReviewModal(id, true);
    });
  });

  container.querySelectorAll('[data-view-review]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var id = this.getAttribute('data-view-review');
      var order = getOrderById(id);
      var data = JSON.parse(localStorage.getItem('review_' + id) || 'null');
      if (!data || !order) return;
      showReviewSummary(order, data);
    });
  });

  container.querySelectorAll('[data-delete]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var id = this.getAttribute('data-delete');
      if (!confirm('Hapus pesanan ' + id + ' dari riwayat?')) return;
      try {
        var stored = JSON.parse(localStorage.getItem('gunpla_orders') || '[]');
        var filtered = stored.filter(function(o) { return o.id !== id; });
        localStorage.setItem('gunpla_orders', JSON.stringify(filtered));
        localStorage.removeItem('review_' + id);
      } catch (e) {}
      renderHistory(currentFilter);
    });
  });
}

// ── Tab Clicks ──
document.querySelectorAll('.rx-tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.rx-tab').forEach(function(t) { t.classList.remove('active'); });
    this.classList.add('active');
    renderHistory(this.getAttribute('data-filter'));
  });
});

function seedHistory() {
  // No-op: history now comes from pesanan.html (status completed/cancelled)
  // We're not auto-seeding sample data anymore — would conflict with real orders
}

// ── Init ──
function init() {
  seedHistory();
  var u = getUser();
  var displayName = document.getElementById('displayName');
  var displayEmail = document.getElementById('displayEmail');
  var avatar = document.getElementById('avatar');
  console.log('Riwayat - init called, elements:', displayName, displayEmail, avatar);
  if (displayName) displayName.textContent = u.name || 'User';
  if (displayEmail) displayEmail.textContent = u.email || '-';
  if (avatar) avatar.textContent = (u.name || 'U').charAt(0).toUpperCase();
  renderHistory('selesai');
}

document.getElementById('logoutBtn').addEventListener('click', function(e) {
  e.preventDefault();
  if (confirm('Yakin ingin keluar?')) {
    try { localStorage.removeItem('gunpla_user'); } catch (err) {}
    window.location.href = '../index.html';
  }
});

window.addEventListener('DOMContentLoaded', function() {
  setTimeout(init, 100);
});

// ═══════════════ REVIEW MODAL ═══════════════
var reviewStarsContainer = null;
var selectedRating = 0;

function openReviewModal(orderId, editExisting) {
  // Remove any existing review overlay first
  var old = document.querySelector('.review-modal-overlay');
  if (old) old.remove();

  var reviewData = editExisting ? JSON.parse(localStorage.getItem('review_' + orderId) || 'null') : null;
  if (!reviewData) reviewData = { rating: 0, comment: '' };

  selectedRating = reviewData.rating || 0;

  var reviewStars = '';
  for (var s = 1; s <= 5; s++) {
    reviewStars += '<i class="fas fa-star" data-star="' + s + '" style="font-size:28px;color:#d1d5db;cursor:pointer;transition:color 0.15s;"></i>';
  }

  var overlay = document.createElement('div');
  overlay.className = 'review-modal-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:999999;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);';
  overlay.innerHTML = '<div class="review-modal-content" style="background:white;border-radius:16px;width:95%;max-width:440px;padding:28px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.3);max-height:85vh;overflow-y:auto;">'
    + '<button class="review-modal-close" onclick="this.closest(\'.review-modal-overlay\').remove()" style="position:absolute;top:12px;right:14px;background:#f3f4f6;border:none;font-size:22px;cursor:pointer;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#6b7280;">&times;</button>'
    + '<h3 style="font-size:18px;font-weight:700;margin:0 0 4px;font-family:\'Oswald\',sans-serif;">ULASAN PRODUK</h3>'
    + '<p style="font-size:13px;color:#6b7280;margin:0 0 18px;" id="reviewOrderTitle">' + orderId + '</p>'
    + '<div style="margin-bottom:16px;">'
    + '  <label style="font-size:13px;font-weight:600;color:#374151;display:block;margin-bottom:6px;">Rating</label>'
    + '  <div id="reviewStarContainer" style="display:flex;gap:6px;">'
    + reviewStars
    + '  </div>'
    + '  <p style="font-size:12px;color:#9ca3af;margin:4px 0 0;" id="ratingLabel">Pilih bintang</p>'
    + '</div>'
    + '<div style="margin-bottom:20px;">'
    + '  <label style="font-size:13px;font-weight:600;color:#374151;display:block;margin-bottom:6px;">Komentar</label>'
    + '  <textarea id="reviewCommentBox" rows="3" style="width:100%;border:1px solid #d1d5db;border-radius:8px;padding:10px;font-size:14px;font-family:\'Inter\',sans-serif;resize:vertical;box-sizing:border-box;" placeholder="Bagaimana pengalaman Anda dengan produk ini?">' + (reviewData.comment || '') + '</textarea>'
    + '  <p style="font-size:11px;color:#9ca3af;margin:4px 0 0;">Opsional — maksimal 500 karakter</p>'
    + '</div>'
    + '<div style="display:flex;gap:10px;">'
    + '  <button id="reviewCancelBtn" onclick="this.closest(\'.review-modal-overlay\').remove()" style="flex:1;border:1px solid #d1d5db;background:white;padding:10px;border-radius:8px;font-weight:600;cursor:pointer;font-size:14px;">Batal</button>'
    + '  <button id="reviewSubmitBtn" style="flex:1;border:none;background:#d32f2f;color:white;padding:10px;border-radius:8px;font-weight:600;cursor:pointer;font-size:14px;">Simpan Ulasan</button>'
    + '</div>'
    + '</div>';

  document.body.appendChild(overlay);

  // Star interaction
  var starContainer = overlay.querySelector('#reviewStarContainer');
  var ratingLabel = overlay.querySelector('#ratingLabel');
  var starLabels = ['', 'Buruk', 'Kurang', 'Biasa', 'Bagus', 'Luar Biasa'];

  function getStars() { return starContainer.querySelectorAll('[data-star]'); }

  function highlightStars(count) {
    getStars().forEach(function(s) {
      var sv = parseInt(s.getAttribute('data-star'));
      s.style.color = (sv <= count) ? '#f59e0b' : '#d1d5db';
    });
    ratingLabel.textContent = count > 0 ? starLabels[count] : 'Pilih bintang';
    ratingLabel.style.color = '#9ca3af';
  }

  // Use event delegation so clicks on inner <svg> elements still work
  starContainer.addEventListener('click', function(e) {
    var t = e.target.closest('[data-star]');
    if (!t) return;
    selectedRating = parseInt(t.getAttribute('data-star'));
    highlightStars(selectedRating);
    e.stopPropagation();
  });

  starContainer.addEventListener('mousemove', function(e) {
    var t = e.target.closest('[data-star]');
    if (t) {
      highlightStars(parseInt(t.getAttribute('data-star')));
    }
  });

  starContainer.addEventListener('mouseleave', function() {
    highlightStars(selectedRating);
  });

  highlightStars(selectedRating);

  // Submit
  overlay.querySelector('#reviewSubmitBtn').addEventListener('click', function() {
    if (selectedRating === 0) {
      ratingLabel.textContent = 'Silakan pilih bintang terlebih dahulu';
      ratingLabel.style.color = '#dc2626';
      return;
    }
    var comment = overlay.querySelector('#reviewCommentBox').value.trim();
    if (comment.length > 500) {
      alert('Komentar terlalu panjang (maks 500 karakter).');
      return;
    }
    var data = {
      rating: selectedRating,
      comment: comment,
      date: new Date().toISOString(),
      reviewer: (localStorage.getItem('gunpla_user') ? JSON.parse(localStorage.getItem('gunpla_user')).name : 'User')
    };
    try { localStorage.setItem('review_' + orderId, JSON.stringify(data)); } catch (e) {}
    overlay.remove();
    renderHistory(currentFilter);
  });

  // Close on overlay click
  overlay.addEventListener('click', function(e) {
    if (e.target === this) this.remove();
  });
}

function showReviewSummary(order, data) {
  // Remove any existing review overlay first
  var old = document.querySelector('.review-modal-overlay');
  if (old) old.remove();

  var starsHtml = '';
  for (var i = 1; i <= 5; i++) {
    starsHtml += '<i class="fas fa-star' + (i <= data.rating ? '" style="color:#f59e0b;font-size:20px;"' : '" style="color:#d1d5db;font-size:20px;"') + '></i>';
  }

  var overlay = document.createElement('div');
  overlay.className = 'review-modal-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:99998;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);';
  overlay.innerHTML = '<div class="review-modal-content" style="background:white;border-radius:16px;width:95%;max-width:440px;padding:28px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.3);max-height:85vh;overflow-y:auto;">'
    + '<button class="review-modal-close" onclick="this.closest(\'.review-modal-overlay\').remove()" style="position:absolute;top:12px;right:14px;background:#f3f4f6;border:none;font-size:22px;cursor:pointer;width:32px;height:32px;border-radius:50%;display:flex;align-items-center;justify-content:center;color:#6b7280;">&times;</button>'
    + '<h3 style="font-size:18px;font-weight:700;margin:0 0 4px;font-family:\'Oswald\',sans-serif;">ULASAN ANDA</h3>'
    + '<p style="font-size:13px;color:#6b7280;margin:0 0 18px;">' + (order.items ? order.items[0].name : order.id) + '</p>'
    + '<div style="margin-bottom:16px;">'
    + '  <label style="font-size:13px;font-weight:600;color:#374151;display:block;margin-bottom:6px;">Rating Anda</label>'
    + '  <div style="display:flex;gap:4px;">' + starsHtml + '</div>'
    + '</div>'
    + '<div style="margin-bottom:16px;padding:14px;background:#f9fafb;border-radius:8px;">'
    + '  <div style="font-size:13px;font-weight:600;margin-bottom:4px;">Komentar</div>'
    + '  <p style="font-size:14px;color:#374151;line-height:1.5;">' + (data.comment || '<em style="color:#9ca3af;">Tidak ada komentar</em>') + '</p>'
    + '</div>'
    + '<div style="font-size:12px;color:#9ca38af;margin-bottom:16px;">Dikirim: ' + new Date(data.date).toLocaleDateString('id-ID', {day:'numeric',month:'long',year:'numeric'}) + '</div>'
    + '<div style="display:flex;gap:10px;">'
    + '  <button onclick="this.closest(\'.review-modal-overlay\').remove()" style="flex:1;border:1px solid #d1d5db;background:white;padding:10px;border-radius:8px;font-weight:600;cursor:pointer;font-size:14px;">Tutup</button>'
    + '  <button id="editFromView" style="flex:1;border:none;background:#d32f2f;color:white;padding:10px;border-radius:8px;font-weight:600;cursor:pointer;font-size:14px;">Ubah Ulasan</button>'
    + '</div>'
    + '</div>';

  document.body.appendChild(overlay);

  overlay.querySelector('#editFromView').addEventListener('click', function() {
    var existing = overlay;
    overlay.addEventListener('click', function(e) {
      if (e.target === this) existing.remove();
    });
    openReviewModal(order.id, true);
  });

  overlay.addEventListener('click', function(e) {
    if (e.target === this) this.remove();
  });
}
function getOrderById(id) {
  var stored = getOrders();
  return stored.find(function(o) { return o.id === id; });
}

document.getElementById('historyList').addEventListener('click', function(e) {
  var btn = e.target.closest('[data-detail]');
  if (!btn) return;
  var orderId = btn.getAttribute('data-detail');
  var order = getOrderById(orderId);
  if (!order) return;

  var itemsHtml = '';
  (order.items || []).forEach(function(it, idx) {
    itemsHtml += '<div class="tx-detail-row" style="display:flex;gap:12px;align-items:center;margin-bottom:10px;">'
      + '<img src="' + (it.img || '../images/gundam-unicorn.png') + '" style="width:50px;height:50px;object-fit:contain;background:#f9fafb;border-radius:8px;padding:4px;">'
      + '<div style="flex:1;">'
      + '  <div style="font-weight:600;font-size:13px;">' + (it.name || '-') + '</div>'
      + '  <div style="font-size:12px;color:#6b7280;">' + (it.grade || '') + ' • Qty: ' + (it.qty || 1) + '</div>'
      + '</div>'
      + '<div style="font-weight:700;font-size:13px;color:#d32f2f;">Rp ' + (it.price || 0).toLocaleString('id-ID') + '</div>'
      + '</div>';
    if (idx < (order.items||[]).length - 1) itemsHtml += '<hr style="border:0;border-top:1px dashed #e5e7eb;">';
  });

  var statusLabel = { 'selesai': 'Pesanan Selesai', 'batal': 'Pesanan Dibatalkan', 'dikemas': 'Sedang Dikemas', 'dikirim': 'Sedang Dikirim' };
  var statusColor = { 'selesai': '#16a34a', 'batal': '#dc2626', 'dikemas': '#eab308', 'dikirim': '#2563eb' };

  var sub = 0;
  (order.items || []).forEach(function(it) { sub += (it.price || 0) * (it.qty || 1); });
  var tax = Math.round(sub * 0.11);

  var overlay = document.createElement('div');
  overlay.className = 'detail-modal-overlay';
  overlay.innerHTML = '<div class="detail-modal-content">'
    + '<button class="detail-modal-close" onclick="this.closest(\'.detail-modal-overlay\').remove()" style="position:absolute;top:12px;right:14px;background:#f3f4f6;border:none;font-size:22px;cursor:pointer;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;">&times;</button>'
    + '<div style="padding:20px 24px;overflow-y:auto;max-height:85vh;">'
    + '<h2 style="font-size:20px;font-weight:700;margin:0 0 16px;">DETAIL PESANAN</h2>'
    + '<div style="background:#f9fafb;border-radius:10px;padding:16px;margin-bottom:20px;">'
    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">'
    + '<div><span style="font-size:12px;color:#6b7280;">Order ID</span><br><strong>' + order.id + '</strong></div>'
    + '<div><span style="font-size:12px;color:#6b7280;">Status</span><br><strong style="color:' + (statusColor[order.status]||'#6b7280') + ';">' + (statusLabel[order.status]||order.status) + '</strong></div>'
    + '</div>'
    + '<div style="font-size:13px;color:#6b7280;border-top:1px solid #e5e7eb;padding-top:8px;">Selesai pada ' + formatDateFull(order.date) + '</div>'
    + '</div>'
    + '<h3 style="font-size:15px;font-weight:700;margin:0 0 10px;">ITEM PESANAN</h3>'
    + itemsHtml + '<br>'
    + '<h3 style="font-size:15px;font-weight:700;margin:0 0 10px;">INFORMASI PEMBELI</h3>'
    + '<div style="background:#fef3f2;border:1px solid #fecaca;border-radius:10px;padding:14px;margin-bottom:20px;">'
    + '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">'
    + '<div id="modalRxBuyerAvatar" style="width:40px;height:40px;border-radius:50%;background:#d32f2f;color:white;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:\'Oswald\',sans-serif;">-</div>'
    + '<div><div style="font-size:14px;font-weight:700;" id="modalRxBuyerName">-</div>'
    + '<div style="font-size:12px;color:#6b7280;" id="modalRxBuyerEmail">-</div></div>'
    + '</div>'
    + '<div style="font-size:13px;padding-top:8px;border-top:1px dashed #fecaca;">'
    + '<div style="margin-bottom:4px;"><strong>📞</strong> <span id="modalRxBuyerPhone">-</span></div>'
    + '<div><strong>📍</strong> <span id="modalRxBuyerAddr">-</span></div>'
    + '</div></div>'
    + '<div style="background:#f9fafb;border-radius:10px;padding:14px;">'
    + '<div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:6px;"><span style="color:#6b7280;">Subtotal</span><span>Rp ' + sub.toLocaleString('id-ID') + '</span></div>'
    + '<div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:6px;"><span style="color:#6b7280;">PPN (11%)</span><span>Rp ' + tax.toLocaleString('id-ID') + '</span></div>'
    + '<div style="display:flex;justify-content:space-between;font-size:18px;font-weight:700;border-top:1px solid #e5e7eb;padding-top:8px;margin-top:4px;"><span>Total</span><span style="color:#d32f2f;">Rp ' + (order.total||0).toLocaleString('id-ID') + '</span></div>'
    + '</div>'
    + '<div style="margin-top:16px;display:flex;gap:10px;">'
    + '<button onclick="this.closest(\'.detail-modal-overlay\').remove()" style="flex:1;border:1px solid #d1d5db;background:white;padding:10px;border-radius:8px;font-weight:600;cursor:pointer;">Tutup</button>'
    + '</div>'
    + '</div></div></div>';
  document.body.appendChild(overlay);

  // Populate buyer info from gunpla_shipping or gunpla_user
  try {
    var ship = JSON.parse(localStorage.getItem('gunpla_shipping') || '{}');
    var user = JSON.parse(localStorage.getItem('gunpla_user') || '{}');
    var name = ship.name || user.name || user.display_name || 'Gunpla Elite';
    var email = user.email || 'gunpla@elite.com';
    var phone = ship.phone || '-';
    var addr = '';
    if (ship.address) addr = ship.address;
    if (ship.district) addr += (addr ? ', ' : '') + ship.district;
    if (ship.city) addr += (addr ? ', ' : '') + ship.city;
    if (ship.postalCode) addr += (addr ? ' ' : '') + ship.postalCode;
    if (!addr) addr = '-';
    document.getElementById('modalRxBuyerAvatar').textContent = name.charAt(0).toUpperCase();
    document.getElementById('modalRxBuyerName').textContent = name;
    document.getElementById('modalRxBuyerEmail').textContent = email;
    document.getElementById('modalRxBuyerPhone').textContent = phone;
    document.getElementById('modalRxBuyerAddr').textContent = addr;
  } catch (e) {}

  overlay.addEventListener('click', function(e) {
    if (e.target === this) this.remove();
  });
});
</script>

.detail-modal-content { background: white; border-radius: 16px; width: 95%; max-width: 520px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; position: relative; max-height: 85vh; }
.detail-modal-close { position: absolute; top: 12px; right: 14px; background: #f3f4f6; border: none; font-size: 22px; cursor: pointer; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #6b7280; }
.detail-modal-close:hover { background: #e5e7eb; }
</style>
