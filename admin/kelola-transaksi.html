<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kelola Transaksi — Admin Gunpla Elite (Wireframe)</title>
<link rel="stylesheet" href="admin.css"/>
<link rel="stylesheet" href="kelola-transaksi.css"/>
</head>
<body>
<div id="admin-layout"></div>

<script>
(function () {
  'use strict';

  /* ==================== Sidebar/Topbar Render ==================== */
  function currentPage() {
    var p = window.location.pathname.toLowerCase();
    if (p.indexOf('arsip-artikel') !== -1) return 'arsip-artikel';
    if (p.indexOf('kelola-artikel') !== -1) return 'kelola-artikel';
    if (p.indexOf('kelola-produk') !== -1) return 'kelola-produk';
    if (p.indexOf('kelola-pengguna') !== -1) return 'kelola-pengguna';
    if (p.indexOf('kelola-transaksi') !== -1) return 'kelola-transaksi';
    return 'dashboard';
  }

  function getCurrentAdmin() {
    try {
      var raw = localStorage.getItem('gunpla_user');
      if (!raw) return null;
      var u = JSON.parse(raw);
      if (u.email === 'admin@gunpla.id' && (!u.role || u.role === 'Customer')) {
        u.role = 'Super Admin';
        u.name = u.name || 'Admin Gunpla';
        try { localStorage.setItem('gunpla_user', JSON.stringify(u)); } catch (e) {}
      }
      return {
        nama: u.name || u.nama || (u.email ? u.email.split('@')[0] : 'Admin'),
        email: u.email || '',
        role: u.role || 'Admin',
        initials: (u.name || u.nama || 'AD').split(' ').map(function(s){return s[0];}).join('').slice(0,2).toUpperCase()
      };
    } catch (e) { return null; }
  }

  function renderLayout(options) {
    var cp = options.page || currentPage();
    var pageTitle = options.title || 'Dashboard';
    var pageSubtitle = options.subtitle || '';
    var content = options.content || '';

    var me = getCurrentAdmin() || { nama: 'Admin Gunpla', email: '', role: 'Super Admin', initials: 'AD' };

    var navItems = [
      { key: 'dashboard', label: 'Dashboard', href: 'dashboard.html' },
      { key: 'kelola-produk', label: 'Kelola Produk', href: 'kelola-produk.html' },
      { key: 'kelola-transaksi', label: 'Kelola Transaksi', href: 'kelola-transaksi.html' },
      { key: 'kelola-artikel', label: 'Kelola Artikel', href: 'kelola-artikel.html' },
      { key: 'arsip-artikel', label: 'Arsip Artikel', href: 'arsip-artikel.html' },
      { key: 'kelola-pengguna', label: 'Kelola Pengguna', href: 'kelola-pengguna.html' }
    ];

    var navIcons = {
      'dashboard': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>',
      'kelola-produk': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>',
      'kelola-transaksi': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>',
      'kelola-artikel': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>',
      'arsip-artikel': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>',
      'kelola-pengguna': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>'
    };
    var navHTML = '';
    for (var i = 0; i < navItems.length; i++) {
      var item = navItems[i];
      var activeClass = cp === item.key ? ' active' : '';
      navHTML += '<a href="' + item.href + '" class="admin-nav-link' + activeClass + '">'
        + '<span class="icon">' + (navIcons[item.key] || '') + '</span>'
        + '<span>' + item.label + '</span>'
        + '</a>';
    }

    return ''
      + '<div class="admin-wrapper">'
      + '<aside class="admin-sidebar" id="admin-sidebar">'
      +   '<div class="admin-sidebar-brand">'
      +     '<div class="admin-sidebar-brand-icon">GE</div>'
      +     '<div class="admin-sidebar-brand-text">'
      +       '<strong>Gunpla Elite</strong>'
      +       '<small>Admin Panel</small>'
      +     '</div>'
      +   '</div>'
      +   '<div class="admin-sidebar-section">Menu Utama</div>'
      +   '<nav class="admin-sidebar-nav">' + navHTML + '</nav>'
      +   '<div class="admin-sidebar-footer">'
      +     '<a href="../index.html" class="admin-user-card" title="' + me.email + '">'
      +       '<div class="admin-user-avatar">' + me.initials + '</div>'
      +       '<div class="admin-user-info">'
      +         '<strong>' + me.nama + '</strong>'
      +         '<small>' + me.role + '</small>'
      +       '</div>'
      +     '</a>'
      +     '<button class="admin-logout-btn" id="adminLogoutBtn" title="Keluar" style="display:flex;align-items:center;gap:8px;padding:8px 10px;margin-top:6px;width:100%;background:transparent;border:1px solid #e5e7eb;border-radius:6px;cursor:pointer;color:#6b7280;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;transition:background 120ms ease, color 120ms ease;" onmouseover="this.style.background=\'#f9fafb\';this.style.color=\'#1e293b\';this.style.borderColor=\'#c0c0c0\'" onmouseout="this.style.background=\'transparent\';this.style.color=\'#6b7280\';this.style.borderColor=\'#e5e7eb\'">'
      +       '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>'
      +       'Keluar'
      +     '</button>'
      +   '</div>'
      + '</aside>'
      + '<main class="admin-main">'
      +   '<header class="admin-topbar">'
      +     '<div style="display:flex;align-items:center;gap:12px;">'
      +       '<button class="admin-menu-toggle" id="adminMenuToggle" aria-label="Menu">&#9776;</button>'
      +       '<div class="admin-topbar-title">'
      +         '<h1>' + pageTitle + '</h1>'
      +         (pageSubtitle ? '<p>' + pageSubtitle + '</p>' : '')
      +       '</div>'
      +     '</div>'
      +     '<div class="admin-topbar-actions">'
      +     '<div class="admin-topbar-search">'
      +       '<span class="search-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>'
      +       '<input type="text" placeholder="Cari data..."/>'
      +     '</div>'
      +     '<a href="#" class="admin-icon-btn" title="Notifikasi">'
      +       '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>'
      +       '<span class="dot"></span>'
      +     '</a>'
      +     '<a href="../index.html" class="admin-icon-btn" title="Ke Website">'
      +       '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>'
      +     '</a>'
      +     '<a href="#" class="admin-icon-btn" id="adminLogoutTopbar" title="Keluar" style="color:#6b7280;">'
      +       '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>'
      +     '</a>'
      +     '</div>'
      +   '</header>'
      +   '<section class="admin-content">' + content + '</section>'
      + '</main>'
      + '</div>';
  }

  /* ==================== LocalStorage Store ==================== */
  var KEYS = {
    produk: 'gunpla_produk',
    transaksi: 'gunpla_transaksi',
    artikel: 'gunpla_artikel',
    pengguna: 'gunpla_pengguna',
    activity: 'gunpla_activity'
  };
  function read(key) {
    try { var raw = localStorage.getItem(KEYS[key] || key); return raw ? JSON.parse(raw) : []; } catch (e) { return []; }
  }
  function write(key, data) { localStorage.setItem(KEYS[key] || key, JSON.stringify(data)); }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
  function logActivity(msg) {
    var log = read('activity');
    log.unshift({ time: new Date().toISOString(), message: msg });
    if (log.length > 50) log = log.slice(0, 50);
    write('activity', log);
  }
  function seedIfEmpty() {
    if (read('transaksi').length === 0) {
      var sampleOrders = read('gunpla_orders');
      if (sampleOrders && sampleOrders.length) {
        var tx = sampleOrders.map(function (o, i) {
          return {
            id: o.id || ('TRX-' + (1000 + i)),
            tanggal: (o.date || o.tanggal || new Date().toISOString()).slice(0, 10),
            pembeli: o.customer || o.pembeli || (o.user && o.user.name) || 'Guest',
            total: o.total || 0,
            status: o.status || 'Diproses'
          };
        });
        write('transaksi', tx);
      } else {
        write('transaksi', [
          { id: 'TRX-1001', tanggal: '2026-01-05', pembeli: 'Rizky Pratama', total: 1370000, status: 'Selesai' },
          { id: 'TRX-1002', tanggal: '2026-01-08', pembeli: 'Andini Sari', total: 720000, status: 'Dikirim' },
          { id: 'TRX-1003', tanggal: '2026-01-12', pembeli: 'Budi Santoso', total: 1850000, status: 'Diproses' },
          { id: 'TRX-1004', tanggal: '2026-01-15', pembeli: 'Citra Lestari', total: 890000, status: 'Dibatalkan' },
          { id: 'TRX-1005', tanggal: '2026-01-18', pembeli: 'Dimas Aulia', total: 2450000, status: 'Dikemas' }
        ]);
      }
    }
  }
  var gunplaStore = {
    list: function (k) { return read(k); },
    get: function (k, id) { var arr = read(k); for (var i = 0; i < arr.length; i++) if (arr[i].id === id) return arr[i]; return null; },
    create: function (k, item) { var arr = read(k); item.id = uid(); arr.push(item); write(k, arr); logActivity('Tambah data ' + k); return item; },
    update: function (k, id, patch) { var arr = read(k); for (var i = 0; i < arr.length; i++) { if (arr[i].id === id) { Object.keys(patch).forEach(function (key) { arr[i][key] = patch[key]; }); write(k, arr); logActivity('Ubah data ' + k); return arr[i]; } } return null; },
    remove: function (k, id) { var arr = read(k).filter(function (x) { return x.id !== id; }); write(k, arr); logActivity('Hapus data ' + k); },
    removeByField: function (k, field, value) { var arr = read(k).filter(function (x) { return x[field] !== value; }); write(k, arr); logActivity('Hapus data ' + k); },
    seed: seedIfEmpty,
    log: logActivity,
    activity: function () { return read('activity'); },
    formatRp: function (n) { return 'Rp ' + Number(n).toLocaleString('id-ID'); }
  };

  /* ==================== Modal & Toast ==================== */
  function ensureOverlay() {
    var el = document.getElementById('wf-modal-root');
    if (el) return el;
    el = document.createElement('div'); el.id = 'wf-modal-root'; el.className = 'wf-modal-overlay';
    document.body.appendChild(el); return el;
  }
  function ensureToast() {
    var el = document.getElementById('wf-toast');
    if (el) return el;
    el = document.createElement('div'); el.id = 'wf-toast'; el.className = 'wf-toast';
    document.body.appendChild(el); return el;
  }
  var gunplaUI = {
    openModal: function (title, bodyHtml, onSubmit) {
      var root = ensureOverlay();
      root.innerHTML = '<div class="wf-modal"><div class="wf-modal-header"><div class="wf-modal-title">' + title + '</div><button class="wf-modal-close" id="wfModalClose">&times;</button></div><form id="wfModalForm"><div class="wf-modal-body">' + bodyHtml + '</div><div class="wf-modal-footer"><button type="button" class="btn-admin btn-admin-secondary" id="wfModalCancel">Batal</button><button type="submit" class="btn-admin btn-admin-primary">Simpan</button></div></form></div>';
      root.classList.add('open');
      function close() { root.classList.remove('open'); root.innerHTML = ''; }
      document.getElementById('wfModalClose').onclick = close;
      document.getElementById('wfModalCancel').onclick = close;
      root.onclick = function (e) { if (e.target === root) close(); };
      document.getElementById('wfModalForm').onsubmit = function (e) {
        e.preventDefault();
        var data = {};
        var els = root.querySelectorAll('input, select, textarea');
        els.forEach(function (el) { data[el.name] = el.value; });
        var result = onSubmit(data);
        if (result !== false) close();
      };
    },
    confirm: function (message, onYes) {
      var root = ensureOverlay();
      root.innerHTML = '<div class="wf-modal" style="max-width:420px;"><div class="wf-modal-header"><div class="wf-modal-title">Konfirmasi</div><button class="wf-modal-close" id="wfModalClose">&times;</button></div><div class="wf-modal-body"><p style="margin:0;color:#6b7280;">' + message + '</p></div><div class="wf-modal-footer"><button type="button" class="btn-admin btn-admin-secondary" id="wfNo">Batal</button><button type="button" class="btn-admin btn-admin-primary" id="wfYes">Ya</button></div></div>';
      root.classList.add('open');
      function close() { root.classList.remove('open'); root.innerHTML = ''; }
      document.getElementById('wfModalClose').onclick = close;
      document.getElementById('wfNo').onclick = close;
      document.getElementById('wfYes').onclick = function () { close(); onYes(); };
      root.onclick = function (e) { if (e.target === root) close(); };
    },
    toast: function (message) {
      var t = ensureToast();
      t.textContent = message;
      t.classList.add('show');
      clearTimeout(t._timer);
      t._timer = setTimeout(function () { t.classList.remove('show'); }, 2200);
    }
  };

  /* ==================== Menu Toggle & Logout ==================== */
  function doLogout(e) {
    if (e) e.preventDefault();
    try { localStorage.removeItem('gunpla_user'); } catch (err) {}
    window.location.href = '../login/login.html';
  }
  function initMenuToggle() {
    var btn = document.getElementById('adminMenuToggle');
    var sb = document.getElementById('admin-sidebar');
    if (!btn || !sb) return;
    btn.addEventListener('click', function (e) { e.stopPropagation(); sb.classList.toggle('open'); });
    document.addEventListener('click', function (e) {
      if (!e.target.closest('.admin-sidebar') && !e.target.closest('#adminMenuToggle')) sb.classList.remove('open');
    });
  }
  function initLogout() {
    var side = document.getElementById('adminLogoutBtn');
    var top = document.getElementById('adminLogoutTopbar');
    if (side) side.addEventListener('click', doLogout);
    if (top) top.addEventListener('click', doLogout);
  }

  /* ==================== Page: Kelola Transaksi ==================== */
  initMenuToggle();
  gunplaStore.seed();

  var me = (function(){
    try { return JSON.parse(localStorage.getItem('gunpla_user') || 'null') || {}; } catch(e){ return {}; }
  })();
  var meRole = me.role || 'Super Admin';
  if (me.email === 'admin@gunpla.id') meRole = 'Super Admin';
  if (!me.email) meRole = 'Super Admin';
  var canEdit = meRole === 'Super Admin' || meRole === 'Admin';

  var allTrx = [
    { id: 'TRX-1001', tanggal: '2026-01-05', pembeli: 'Rizky Pratama', total: 1370000, status: 'Selesai' },
    { id: 'TRX-1002', tanggal: '2026-01-08', pembeli: 'Andini Sari', total: 720000, status: 'Dikirim' },
    { id: 'TRX-1003', tanggal: '2026-01-12', pembeli: 'Budi Santoso', total: 1850000, status: 'Diproses' },
    { id: 'TRX-1004', tanggal: '2026-01-15', pembeli: 'Citra Lestari', total: 890000, status: 'Dibatalkan' },
    { id: 'TRX-1005', tanggal: '2026-01-18', pembeli: 'Dimas Aulia', total: 2450000, status: 'Dikemas' },
    { id: 'TRX-1006', tanggal: '2026-01-22', pembeli: 'Eka Putri', total: 450000, status: 'Selesai' },
    { id: 'TRX-1007', tanggal: '2026-01-25', pembeli: 'Fajar Nugraha', total: 380000, status: 'Diproses' },
    { id: 'TRX-1008', tanggal: '2026-02-02', pembeli: 'Gita Wulandari', total: 1650000, status: 'Dikirim' },
    { id: 'TRX-1009', tanggal: '2026-02-05', pembeli: 'Hadi Wijaya', total: 580000, status: 'Selesai' },
    { id: 'TRX-1010', tanggal: '2026-02-08', pembeli: 'Indah Permata', total: 720000, status: 'Diproses' },
    { id: 'TRX-1011', tanggal: '2026-02-12', pembeli: 'Jaka Pratama', total: 1850000, status: 'Dikirim' },
    { id: 'TRX-1012', tanggal: '2026-02-15', pembeli: 'Kartika Sari', total: 2450000, status: 'Selesai' }
  ];
  var trxList = (meRole === 'Super Admin' || meRole === 'Admin')
    ? allTrx
    : allTrx.filter(function(t){ return t.pembeli === me.name; });
  var tableBody = '';
  for (var i = 0; i < trxList.length; i++) {
    var t = trxList[i];
    var sc = '';
    if (t.status === 'Dikirim') sc = ' style="background:#d32f2f;"';
    else if (t.status === 'Diproses') sc = ' style="background:#f59e0b;"';
    else if (t.status === 'Dibatalkan') sc = ' style="background:#dc2626;color:#ffffff;"';
    var actionCell = canEdit
      ? '<td><div class="admin-action-cell">'
      + '<button class="admin-action-btn" title="Ubah Status" onclick="changeStatus(\'' + t.id + '\')" style="font-size:10px;">&#8644;</button>'
      + '<button class="admin-action-btn" title="Edit" onclick="editTrx(\'' + t.id + '\')" style="font-size:10px;">&#9998;</button>'
      + '<button class="admin-action-btn" title="Hapus" onclick="deleteTrx(\'' + t.id + '\')" style="font-size:10px;">&#10005;</button>'
      + '</div></td>'
      : '<td><span style="font-size:11px;color:#6b7280;">Lihat</span></td>';
    tableBody += '<tr>'
      + '<td><strong>' + t.id + '</strong><div style="font-size:11px;color:#757575;">' + t.tanggal + '</div></td>'
      + '<td>' + t.pembeli + '</td>'
      + '<td>' + gunplaStore.formatRp(t.total) + '</td>'
      + '<td><span class="admin-badge"' + sc + '>' + t.status + '</span></td>'
      + actionCell
      + '</tr>';
  }

  var subtitle = canEdit
    ? 'Pantau, ubah status, dan kelola pesanan pelanggan'
    : 'Riwayat pesanan Anda';
  var newBtn = canEdit
    ? '<button class="btn-admin btn-admin-primary" onclick="openForm()"><span>&#43;</span> Transaksi Baru</button>'
    : '';

  var content = ''
    + '<div class="admin-page-header">'
    +   '<div class="admin-page-header-text">'
    +     '<div class="admin-page-eyebrow">Pesanan &middot; ' + meRole + '</div>'
    +     '<h2>Kelola Transaksi</h2>'
    +     '<p>' + subtitle + '</p>'
    +   '</div>'
    +   newBtn
    + '</div>'

    + '<div class="stat-grid" style="grid-template-columns:repeat(5,1fr);gap:12px;">'
    +   '<div class="stat-card">'
    +     '<div class="stat-card-header"><span class="stat-card-label">Total Pesanan</span><div class="stat-card-icon">T</div></div>'
    +     '<div class="stat-card-value">' + trxList.length + '</div>'
    +   '</div>'
    +   '<div class="stat-card">'
    +     '<div class="stat-card-header"><span class="stat-card-label">Diproses</span><div class="stat-card-icon">P</div></div>'
    +     '<div class="stat-card-value">' + trxList.filter(function(x){return x.status==="Diproses";}).length + '</div>'
    +   '</div>'
    +   '<div class="stat-card">'
    +     '<div class="stat-card-header"><span class="stat-card-label">Dikirim</span><div class="stat-card-icon">K</div></div>'
    +     '<div class="stat-card-value">' + trxList.filter(function(x){return x.status==="Dikirim";}).length + '</div>'
    +   '</div>'
    +   '<div class="stat-card">'
    +     '<div class="stat-card-header"><span class="stat-card-label">Selesai</span><div class="stat-card-icon">S</div></div>'
    +     '<div class="stat-card-value">' + trxList.filter(function(x){return x.status==="Selesai";}).length + '</div>'
    +   '</div>'
    +   '<div class="stat-card">'
    +     '<div class="stat-card-header"><span class="stat-card-label">Dibatalkan</span><div class="stat-card-icon" style="background:#fef2f2;border-color:#fecaca;color:#d32f2f;">B</div></div>'
    +     '<div class="stat-card-value">' + trxList.filter(function(x){return x.status==="Dibatalkan";}).length + '</div>'
    +   '</div>'
    + '</div>'

    + '<div class="admin-panel">'
    +   '<div class="admin-panel-header">'
    +     '<div class="filter-bar">'
    +       '<select class="form-select" onchange="filterStatus(this.value)">'
    +         '<option value="">Semua Status</option>'
    +         '<option value="Diproses">Diproses</option>'
    +         '<option value="Dikirim">Dikirim</option>'
    +         '<option value="Selesai">Selesai</option>'
    +         '<option value="Dibatalkan">Dibatalkan</option>'
    +       '</select>'
    +       '<input class="form-input" placeholder="Cari ID / pembeli..." id="trxSearchInput" onkeyup="filterSearch()" style="min-width:180px;" />'
    +     '</div>'
    +   '</div>'
    +   '<div class="admin-panel-body no-padding">'
    +     '<table class="admin-table">'
    +       '<thead><tr><th>ID Pesanan</th><th>Pembeli</th><th>Total</th><th>Status</th><th>Aksi</th></tr></thead>'
    +       '<tbody id="trxTbody">' + tableBody + '</tbody>'
    +     '</table>'
    +   '</div>'
    + '</div>';

  document.getElementById('admin-layout').innerHTML = renderLayout({
    title: 'Kelola Transaksi',
    subtitle: 'Manajemen pesanan pelanggan',
    page: 'kelola-transaksi',
    content: content
  });
  initMenuToggle();
  initLogout();

  function openForm(id) {
    var existing = null;
    if (id) existing = gunplaStore.get('transaksi', id);
    var d = existing || { id: '', tanggal: new Date().toISOString().slice(0,10), pembeli: '', total: 0, status: 'Diproses' };

    gunplaUI.openModal(existing ? 'Edit Transaksi' : 'Tambah Transaksi',
      '<div class="form-row">'
      + '<div class="form-field"><label>ID Transaksi</label><input type="text" name="id" value="'+d.id+'" required/></div>'
      + '<div class="form-field"><label>Tanggal</label><input type="date" name="tanggal" value="'+d.tanggal+'"/></div>'
      + '</div>'
      + '<div class="form-row">'
      + '<div class="form-field"><label>Nama Pembeli *</label><input type="text" name="pembeli" value="'+d.pembeli+'" required/></div>'
      + '<div class="form-field"><label>Total (Rp) *</label><input type="number" name="total" value="'+d.total+'" required/></div>'
      + '</div>'
      + '<div class="form-field"><label>Status</label><select name="status">'
      + '<option'+(d.status==="Diproses"?' selected':'')+'>Diproses</option>'
      + '<option'+(d.status==="Dikirim"?' selected':'')+'>Dikirim</option>'
      + '<option'+(d.status==="Selesai"?' selected':'')+'>Selesai</option>'
      + '<option'+(d.status==="Dibatalkan"?' selected':'')+'>Dibatalkan</option>'
      + '</select></div>',
      function(f) {
        if (id) {
          gunplaStore.update('transaksi', id, f);
        } else {
          gunplaStore.create('transaksi', f);
        }
        renderAll();
        gunplaUI.toast('Transaksi berhasil disimpan!');
      }
    );
  }

  function changeStatus(id) {
    var t = gunplaStore.get('transaksi', id);
    var st = ['Diproses','Dikirim','Selesai','Dibatalkan'];
    var r = document.getElementById('wf-modal-root') || (function(){
      var e = document.createElement('div'); e.id='wf-modal-root'; e.className='wf-modal-overlay';
      document.body.appendChild(e); return e;
    })();
    r.innerHTML = '<div class="wf-modal" style="max-width:420px;">'
      + '<div class="wf-modal-header"><div class="wf-modal-title">Ubah Status</div><button class="wf-modal-close" id="x1">&times;</button></div>'
      + '<div class="wf-modal-body"><div class="form-field"><label>Pilih Status</label><select id="ns">'
      + st.map(function(s){return '<option'+(t.status===s?' selected':'')+'>'+s+'</option>';}).join('')
      + '</select></div></div>'
      + '<div class="wf-modal-footer">'
      + '<button type="button" class="btn-admin btn-admin-secondary" id="x2">Batal</button>'
      + '<button type="button" class="btn-admin btn-admin-primary" id="x3">Simpan</button>'
      + '</div></div>';
    r.classList.add('open');
    function cl(){r.classList.remove('open');r.innerHTML='';}
    document.getElementById('x1').onclick=cl;
    document.getElementById('x2').onclick=cl;
    document.getElementById('x3').onclick=function(){
      gunplaStore.update('transaksi',id,{status:document.getElementById('ns').value});
      cl();renderAll();gunplaUI.toast('Status diubah!');
    };
  }

  function editTrx(id) { openForm(id); }
  function deleteTrx(id) {
    gunplaUI.confirm('Hapus transaksi ini?',function(){
      gunplaStore.removeByField('transaksi','id',id);renderAll();gunplaUI.toast('Transaksi dihapus!');
    });
  }
  function filterStatus(v) {
    var rows=document.querySelectorAll('#trxTbody tr');
    for(var i=0;i<rows.length;i++){if(!v){rows[i].style.display='';}else{rows[i].style.display=rows[i].textContent.indexOf(v)!==-1?'':'none';}}
  }
  function filterSearch() {
    var q=document.getElementById('trxSearchInput').value.toLowerCase();
    var rows=document.querySelectorAll('#trxTbody tr');
    for(var i=0;i<rows.length;i++){rows[i].style.display=rows[i].textContent.toLowerCase().indexOf(q)!==-1?'':'none';}
  }
  function renderAll() {
    var allData = gunplaStore.list('transaksi');
    var list = (meRole === 'Super Admin' || meRole === 'Admin')
      ? allData
      : allData.filter(function(t){ return t.pembeli === me.name; });
    var tb='';
    for(var i=0;i<list.length;i++){
      var t=list[i],sc='';
      if(t.status==='Dikirim') sc=' style="background:#d32f2f;"';
      else if(t.status==='Diproses') sc=' style="background:#f59e0b;"';
      else if(t.status==='Dibatalkan') sc=' style="background:#dc2626;color:#ffffff;"';
      var actionCell = canEdit
        ? '<td><div class="admin-action-cell">'
          + '<button class="admin-action-btn" title="Ubah Status" onclick="changeStatus(\''+t.id+'\')" style="font-size:10px;">&#8644;</button>'
          + '<button class="admin-action-btn" title="Edit" onclick="editTrx(\''+t.id+'\')" style="font-size:10px;">&#9998;</button>'
          + '<button class="admin-action-btn" title="Hapus" onclick="deleteTrx(\''+t.id+'\')" style="font-size:10px;">&#10005;</button>'
          + '</div></td>'
        : '<td><span style="font-size:11px;color:#6b7280;">Lihat</span></td>';
      tb+='<tr><td><strong>'+t.id+'</strong><div style="font-size:11px;color:#757575;">'+t.tanggal+'</div></td>'
      +'<td>'+t.pembeli+'</td><td>'+gunplaStore.formatRp(t.total)+'</td>'
      +'<td><span class="admin-badge">'+t.status+'</span></td>'
      +actionCell+'</tr>';
    }
    document.getElementById('trxTbody').innerHTML=tb;
    document.querySelectorAll('.stat-card-value')[0].textContent=list.length;
    document.querySelectorAll('.stat-card-value')[1].textContent=list.filter(function(x){return x.status==='Diproses';}).length;
    document.querySelectorAll('.stat-card-value')[2].textContent=list.filter(function(x){return x.status==='Dikirim';}).length;
    document.querySelectorAll('.stat-card-value')[3].textContent=list.filter(function(x){return x.status==='Selesai';}).length;
  }

  window.openForm=openForm;
  window.changeStatus=changeStatus;
  window.editTrx=editTrx;
  window.deleteTrx=deleteTrx;
  window.filterStatus=filterStatus;
  window.filterSearch=filterSearch;
})();
</script>
</body>
</html>
