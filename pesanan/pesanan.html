function renderTimeline(status) {
  var stepMap = { dikemas: 0, dikirim: 1, transit: 2, selesai: 3, batal: -1 };
  var labels = ['Dikemas', 'Dikirim', 'Transit', 'Diterima'];
  var icons  = ['fa-box', 'fa-truck', 'fa-shipping-fast', 'fa-check'];
  var activeIdx = stepMap[status] !== undefined ? stepMap[status] : -1;

  var fillWidth = 0;
  if (activeIdx > 0) fillWidth = ((activeIdx) / (labels.length - 1)) * 100;

  var stepsHtml = '';
  for (var i = 0; i < labels.length; i++) {
    var cls = '';
    if (i < activeIdx) cls = 'completed';
    else if (i === activeIdx) cls = 'current';

    var checkIcon = (i <= activeIdx && activeIdx >= 0) ? '<i class="fas fa-check"></i>' : '<i class="fas ' + icons[i] + '"></i>';
    stepsHtml += '<div class="timeline-step ' + cls + '">'
      + '<div class="timeline-dot">' + checkIcon + '</div>'
      + '<span class="timeline-label">' + labels[i] + '</span>'
      + '</div>';
  }

  if (status === 'batal') {
    return '<div class="tracking-header">'
      + '<span class="tracking-title"><i class="fas fa-times-circle" style="color:#ef4444"></i> PESANAN DIBATALKAN</span>'
      + '</div><div class="py-4 text-center"><p class="text-red-600 font-semibold text-sm">Pesanan ini telah dibatalkan.</p></div>';
  }

  return '<div class="tracking-header">'
    + '<span class="tracking-title"><i class="fas fa-shipping-fast"></i> STATUS PENGIRIMAN</span>'
    + '</div><div class="timeline">'
    + '<div class="timeline-line"></div>'
    + '<div class="timeline-line-fill" style="width:' + fillWidth + '%"></div>'
    + stepsHtml + '</div>';
}

function renderOrders(filter) {
  var container = document.getElementById('ordersContainer');
  if (!filter || filter === 'Semua') {
    container.innerHTML = ordersByStatus['dikemas']
      + ordersByStatus['dikirim']
      + ordersByStatus['selesai']
      + ordersByStatus['batal'];
    return;
  }
  var mapped = {
    'Sedang Dikemas': 'dikemas',
    'Dikirim': 'dikirim',
    'Selesai': 'selesai',
    'Dibatalkan': 'batal'
  };
  var key = mapped[filter];
  container.innerHTML = (ordersByStatus[key] || '') + buildEmptyState();
}

function buildEmptyState() {
  return '<div class="empty-state">'
    + '<i class="fas fa-shopping-bag"></i>'
    + '<p class="text-main">Belum ada pesanan</p>'
    + '<p class="text-sub">Kategori ini kosong.</p>'
    + '</div>';
}

function init() {
  var u = getUser();
  document.getElementById('displayName').textContent = u.name || 'User';
  document.getElementById('displayEmail').textContent = u.email || '-';
  document.getElementById('avatar').textContent = (u.name || 'U').charAt(0).toUpperCase();

  document.querySelectorAll('.filter-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      var filter = this.getAttribute('data-tab');
      document.querySelectorAll('.filter-tab').forEach(function(t) { t.classList.remove('active'); });
      this.classList.add('active');
      renderOrders(filter);
    });
  });

  renderOrders('Semua');
}

document.getElementById('logoutBtn').addEventListener('click', function(e) {
  e.preventDefault();
  if (confirm('Yakin ingin keluar?')) {
    try { localStorage.removeItem('gunpla_user'); } catch (err) {}
    window.location.href = '../home.html';
  }
});

init();
</script>
