<!DOCTYPE html>
<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Keranjang - Gunpla Elite</title>
<link rel="stylesheet" href="../home.css"/>
<link rel="stylesheet" href="keranjang.css"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
</head>
<body class="bg-white text-gray-800 antialiased">

<!-- BEGIN: MainHeader -->
<div id="navbar-container"></div>
<script src="../components/navbar.js"></script>
<!-- END: MainHeader -->



<!-- Cart Items -->
<section class="py-12">
<div class="container mx-auto px-4 max-w-3xl">
<h2 class="text-xl font-oswald font-bold uppercase mb-6 border-l-4 border-primary-red pl-3">Item di Keranjang</h2>

<div class="bg-white border border-gray-200">

<!-- Item 1 -->
<div class="cart-item flex gap-4 p-4 border-b border-gray-200" data-price="720000">
<div class="w-24 h-24 bg-gray-100 rounded flex items-center justify-center flex-shrink-0">
<img alt="ZGMF-X10A Freedom Gundam" class="max-w-full max-h-full object-contain mix-blend-multiply" src="../images/gundam-freedom.png"/>
</div>
<div class="flex-grow min-w-0">
<h3 class="font-bold text-sm mb-1 line-clamp-1">ZGMF-X10A FREEDOM GUNDAM</h3>
<p class="text-xs text-gray-500 uppercase mb-2">MASTER GRADE</p>
<p class="text-primary-red font-bold text-2xl">Rp 720.000</p>
</div>
<div class="flex flex-col items-end justify-between flex-shrink-0">
<div class="flex items-center border border-gray-300 rounded">
<button class="qty-btn w-8 h-8 text-gray-600 hover:text-primary-red" data-action="dec">−</button>
<input class="qty-input w-10 h-8 text-center text-sm font-bold border-x border-gray-300 outline-none" readonly type="text" value="1"/>
<button class="qty-btn w-8 h-8 text-gray-600 hover:text-primary-red" data-action="inc">+</button>
</div>
<button class="text-gray-400 hover:text-primary-red text-xs flex items-center gap-1 mt-2 remove-btn">
<i class="far fa-trash-alt"></i> Hapus
</button>
</div>
<div class="text-right flex-shrink-0 w-32">
<p class="text-xs text-gray-500 uppercase mb-1">Subtotal</p>
<p class="font-bold text-primary-red text-2xl item-subtotal">Rp 720.000</p>
</div>
</div>

<!-- Item 2 -->
<div class="cart-item flex gap-4 p-4 border-b border-gray-200" data-price="650000">
<div class="w-24 h-24 bg-gray-100 rounded flex items-center justify-center flex-shrink-0">
<img alt="MG Barbatos" class="max-w-full max-h-full object-contain mix-blend-multiply" src="../images/gundam-barbatos.png"/>
</div>
<div class="flex-grow min-w-0">
<h3 class="font-bold text-sm mb-1 line-clamp-1">ASW-G-80 BARBATOS</h3>
<p class="text-xs text-gray-500 uppercase mb-2">MASTER GRADE</p>
<p class="text-primary-red font-bold text-2xl">Rp 650.000</p>
</div>
<div class="flex flex-col items-end justify-between flex-shrink-0">
<div class="flex items-center border border-gray-300 rounded">
<button class="qty-btn w-8 h-8 text-gray-600 hover:text-primary-red" data-action="dec">−</button>
<input class="qty-input w-10 h-8 text-center text-sm font-bold border-x border-gray-300 outline-none" readonly type="text" value="1"/>
<button class="qty-btn w-8 h-8 text-gray-600 hover:text-primary-red" data-action="inc">+</button>
</div>
<button class="text-gray-400 hover:text-primary-red text-xs flex items-center gap-1 mt-2 remove-btn">
<i class="far fa-trash-alt"></i> Hapus
</button>
</div>
<div class="text-right flex-shrink-0 w-32">
<p class="text-xs text-gray-500 uppercase mb-1">Subtotal</p>
<p class="font-bold text-primary-red text-2xl item-subtotal">Rp 650.000</p>
</div>
</div>




<!-- Summary -->
<div class="bg-gray-50 border border-gray-200 border-t-0 p-6">
<div class="space-y-3 text-sm">
<div class="flex justify-between">
<span class="text-gray-600">Subtotal (2 item)</span>
<span class="font-bold" id="summarySubtotal">Rp 1.370.000</span>
</div>
<div class="flex justify-between">
<span class="text-gray-600">Ongkos Kirim</span>
<span class="font-bold text-green-600">GRATIS</span>
</div>
<div class="border-t border-gray-300 pt-3 mt-3 flex justify-between items-center">
<span class="font-oswald text-lg uppercase">Total</span>
<span class="font-oswald text-2xl font-bold text-primary-red" id="summaryTotal">Rp 1.370.000</span>
</div>
</div>
<a href="pengiriman.html" class="block w-full bg-primary-red text-white font-bold py-3 rounded mt-6 hover:bg-red-700 transition-colors uppercase tracking-wider text-center">
              Lanjut ke Pengiriman <i class="fas fa-arrow-right ml-2"></i>
            </a>
<a class="block text-center text-primary-red text-sm font-bold mt-3 hover:underline uppercase" href="../katalog/katalog.html">
              ← Lanjut Belanja
            </a>
</div>
</div>
</section>

<!-- BEGIN: MainFooter -->
<div id="footer"></div>
<script src="../components/footer.js"></script>
<!-- END: MainFooter -->

<script>
function formatIDR(n) {
  return 'Rp ' + n.toLocaleString('id-ID');
}

function recalcTotals() {
  let total = 0;
  let count = 0;
  document.querySelectorAll('.cart-item').forEach(function(item) {
    if (item.style.display === 'none') return;
    const price = parseInt(item.getAttribute('data-price'));
    const qty = parseInt(item.querySelector('.qty-input').value);
    total += price * qty;
    count += qty;
  });
  document.getElementById('summarySubtotal').textContent = formatIDR(total) + ' (' + count + ' item)';
  document.getElementById('summaryTotal').textContent = formatIDR(total);
}

document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.cart-item').forEach(function(item) {
    const price = parseInt(item.getAttribute('data-price'));
    const qtyInput = item.querySelector('.qty-input');
    const subtotalEl = item.querySelector('.item-subtotal');

    function updateItem() {
      const qty = parseInt(qtyInput.value);
      subtotalEl.textContent = formatIDR(price * qty);
      recalcTotals();
    }

    item.querySelectorAll('.qty-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        let qty = parseInt(qtyInput.value);
        if (this.getAttribute('data-action') === 'inc') qty++;
        else if (qty > 1) qty--;
        qtyInput.value = qty;
        updateItem();
      });
    });

    item.querySelector('.remove-btn').addEventListener('click', function() {
      item.style.display = 'none';
      recalcTotals();
    });
  });
});
</script>

</body></html>
