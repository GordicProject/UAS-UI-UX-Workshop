<!-- Ringkasan -->
<div class="lg:col-span-1">
<div class="sticky top-24 bg-gray-50 border border-gray-200 rounded-lg p-6">

<div class="space-y-4 mb-6 pb-6 border-b border-gray-200" id="cartItemsSummary"></div>

<div class="space-y-3 text-sm" id="summaryTotals">

</div>

<span class="text-gray-600">Pajak (PPN 11%)</span>

</div>

<script>
function formatIDR(n) {
  return 'Rp ' + n.toLocaleString('id-ID');
}

// Cart data from localStorage
let cart = JSON.parse(localStorage.getItem('gunpla_cart') || '[]');

// If no cart in localStorage, use demo items
if (cart.length === 0) {
  cart = [
    { name: 'ZGMF-X10A FREEDOM GUNDAM', grade: 'MASTER GRADE', price: 720000, qty: 1, image: '../images/gundam-freedom.png' },
    { name: 'ASW-G-80 BARBATOS', grade: 'MASTER GRADE', price: 650000, qty: 1, image: '../images/gundam-barbatos.png' }
  ];
}

// Extract name from email
function extractName(email) {
  if (!email) return '';
  var namePart = email.split('@')[0];           // budi.santoso
  var parts = namePart.split(/[._-]/);           // ['budi', 'santoso']
  // Capitalize first letter of each part
  return parts.map(function(p) {
    return p.charAt(0).toUpperCase() + p.slice(1);
  }).join(' ');
}

function initFormFromEmail() {
  var emailInput = document.getElementById('receiverEmail');
  var nameInput = document.getElementById('receiverName');
  emailInput.value = 'budi.santoso@email.com';
  nameInput.value = extractName(emailInput.value);
}

function renderCartSummary() {
  const container = document.getElementById('cartItemsSummary');
  container.innerHTML = '';

  let subtotal = 0;
  const maxDisplay = Math.min(cart.length, 3);
  for (let i = 0; i < maxDisplay; i++) {
    const item = cart[i];
    const itemTotal = item.price * item.qty;
    subtotal += itemTotal;
    const div = document.createElement('div');
    div.className = 'flex gap-4 p-4 bg-white rounded border border-gray-200 last:border-b-0';
    div.innerHTML = '<div class="w-20 h-20 flex-shrink-0 bg-gray-100 rounded flex items-center justify-center">' +
      '<img alt="' + item.name + '" class="max-w-full max-h-full object-contain mix-blend-multiply" src="' + item.image + '">' +
      '</div>' +
      '<div class="flex-grow min-w-0">' +
      '<h4 class="font-bold text-sm mb-1 line-clamp-1">' + item.name + '</h4>' +
      '<p class="text-xs text-gray-500 uppercase mb-2">' + item.grade + '</p>' +
      '<p class="text-primary-red font-bold text-2xl">' + formatIDR(itemTotal) + '</p>' +
      '</div>' +
      '<div class="text-right flex-shrink-0">' +
      '<p class="text-xs text-gray-500 uppercase mb-1">Qty: ' + item.qty + '</p>' +
      '</div>';
    container.appendChild(div);
  }

  if (cart.length > 3) {
    const moreDiv = document.createElement('div');
    moreDiv.className = 'text-xs text-gray-500';
    moreDiv.textContent = '+' + (cart.length - 3) + ' item lainnya';
    container.appendChild(moreDiv);
  }

  // Calculate totals
  const shippingCost = 15000;
  const tax = Math.round(subtotal * 0.11);
  const total = subtotal + shippingCost + tax;

  document.getElementById('summarySubtotal').textContent = formatIDR(subtotal);
  document.getElementById('summaryShipping').textContent = formatIDR(shippingCost);
  document.getElementById('summaryTax').textContent = formatIDR(tax);
  document.getElementById('summaryTotal').textContent = formatIDR(total);

  // Store for payment page
  window._subtotal = subtotal;
  window._shipping = shippingCost;
  window._tax = tax;
  window._total = total;
}

renderCartSummary();
initFormFromEmail();

function goToPayment() {
  const inputs = document.querySelectorAll('input, select, textarea');
  const shippingData = {
    subtotal: window._subtotal || 0,
    shipping: window._shipping || 15000,
    tax: window._tax || 0,
    total: window._total || 0
  };
  localStorage.setItem('gunpla_shipping', JSON.stringify(shippingData));
  window.location.href = '../pembayaran/pembayaran.html';
}
</script>
